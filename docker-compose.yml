  #       condition: service_healthy
  #   environment:
  #     SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonar_db
  #     SONAR_JDBC_USERNAME: ${POSTGRES_USER:-deliveryapp}
  #     SONAR_JDBC_PASSWORD: ${POSTGRES_PASSWORD:-deliveryapp123}
  #   ports:
  #     - "9000:9000"
