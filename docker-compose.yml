version: "3.9"

# ═══════════════════════════════════════════════════
#  DeliveryApp - Infrastructure Services
#  Usage: docker compose up -d
# ═══════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: deliveryapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: delivery_user
      POSTGRES_PASSWORD: delivery_pass
      POSTGRES_MULTIPLE_DATABASES: auth_db,restaurant_db,order_db,delivery_db,notification_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    networks:
      - deliveryapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deliveryapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── pgAdmin ──────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: deliveryapp-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@deliveryapp.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"   # simpler login, fine for local dev
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - deliveryapp-network

  # ── SonarQube (disabled for now, enable once more services exist) ──
