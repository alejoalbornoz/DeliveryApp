services:
  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: deliveryapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deliveryapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deliveryapp123}
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - deliveryapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deliveryapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-init:
    image: postgres:16-alpine
    container_name: deliveryapp-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-deliveryapp123}
    entrypoint: >
      sh -c "
        psql -h postgres -U $${POSTGRES_USER:-deliveryapp} -d auth_db -c 'CREATE DATABASE restaurant_db;' || true &&
        psql -h postgres -U $${POSTGRES_USER:-deliveryapp} -d auth_db -c 'CREATE DATABASE order_db;' || true &&
        psql -h postgres -U $${POSTGRES_USER:-deliveryapp} -d auth_db -c 'CREATE DATABASE delivery_db;' || true &&
        psql -h postgres -U $${POSTGRES_USER:-deliveryapp} -d auth_db -c 'CREATE DATABASE notification_db;' || true &&
        echo 'All databases created successfully.'
      "
    networks:
      - deliveryapp-network
    restart: "no"

  # ── pgAdmin ──────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: deliveryapp-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@deliveryapp.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - deliveryapp-network

  # ── Apache Kafka (KRaft Mode) ────────────────────
  kafka:
    image: apache/kafka:4.0.0
    container_name: deliveryapp-kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      # El broker tendrá el id 1
      KAFKA_NODE_ID: 1

      # Kafka actuará como Broker y Controller
      KAFKA_PROCESS_ROLES: broker,controller

      # Nombre del listener interno del controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Define los listeners
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      # Dirección que utilizarán los clientes
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

      # Qué protocolo usa cada listener
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      # Quórum de controllers (como hay uno solo, apunta a sí mismo)
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Directorio donde Kafka guarda los logs
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    networks:
      - deliveryapp-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  deliveryapp-network:
    driver: bridge