services:
  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: deliveryapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deliveryapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deliveryapp123}
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - deliveryapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deliveryapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the remaining databases once postgres is healthy.
  # Uses a separate one-shot container to avoid the Windows script-mounting issue.
  postgres-init:
    image: postgres:16-alpine
    container_name: deliveryapp-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-deliveryapp123}
    entrypoint: >
      sh -c "
        psql -h postgres -U $${POSTGRES_USER:-deliveryapp} -d auth_db -c 'CREATE DATABASE restaurant_db;' || true &&
        psql -h postgres -U $${POSTGRES_USER:-deliveryapp} -d auth_db -c 'CREATE DATABASE order_db;' || true &&
        psql -h postgres -U $${POSTGRES_USER:-deliveryapp} -d auth_db -c 'CREATE DATABASE delivery_db;' || true &&
        psql -h postgres -U $${POSTGRES_USER:-deliveryapp} -d auth_db -c 'CREATE DATABASE notification_db;' || true &&
        echo 'All databases created successfully.'
      "
    networks:
      - deliveryapp-network
    restart: "no"

  # ── pgAdmin ──────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: deliveryapp-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@deliveryapp.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - deliveryapp-network

# ═══════════════════════════════════════════════════
volumes:
  postgres_data:
  pgadmin_data:

networks:
  deliveryapp-network:
    driver: bridge
